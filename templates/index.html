<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - NSE Option Chain Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;font-size:13px;overflow:hidden;height:100vh}
.app{display:flex;flex-direction:column;height:100vh;padding:5px 6px;gap:4px;margin-left:200px}
@media(max-width:768px){.app{margin-left:0}}
.hamburger{background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;padding:2px 8px;border-radius:6px;transition:all .2s;display:none;align-items:center}
.hamburger:hover{background:#f1f5f9;color:#1e293b}
.hamburger.show{display:flex}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:99}
.overlay.show{display:block}
.sidebar{position:fixed;top:0;left:0;width:200px;height:100%;background:#fff;z-index:100;padding:0;display:flex;flex-direction:column;transition:left .25s ease;box-shadow:2px 0 15px rgba(0,0,0,0.1)}
@media(max-width:768px){.sidebar{left:-260px}.sidebar.open{left:0}}
.sidebar .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #e2e8f0}
.sidebar .head span{font-weight:700;font-size:14px;color:#1e293b}
.sidebar .head button{background:none;border:none;font-size:16px;color:#64748b;cursor:pointer;padding:2px 6px;border-radius:6px}
.sidebar .head button:hover{background:#f1f5f9}
.sidebar a{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#475569;text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.sidebar a:hover{background:#f8fafc;color:#6366f1;border-left-color:#6366f1}
.sidebar a.active{background:#eef2ff;color:#6366f1;border-left-color:#6366f1;font-weight:600}
.sidebar a .icon{font-size:16px;width:20px;text-align:center}
.top-bar{display:flex;align-items:center;gap:5px;background:#fff;padding:6px 12px;border-radius:10px;border:1px solid #e2e8f0;flex-wrap:wrap}
.top-bar .clock{margin-left:auto;font-size:13px;color:#94a3b8}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero h1{font-size:28px;font-weight:800;color:#1e293b;margin-bottom:10px;letter-spacing:-0.5px}
.hero p{font-size:14px;color:#64748b;max-width:480px;line-height:1.6}
.hero .accent{color:#6366f1}
.hero .btn{margin-top:24px;display:inline-block;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;padding:10px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.hero .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,0.25)}
@media(max-width:768px){
body{overflow:auto;height:auto}
.app{height:auto;padding:4px;gap:4px}
.hero h1{font-size:22px}
.hero p{font-size:13px}
}
</style>
</head>
<body>
<div class="app">
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="head"><span>Navigation</span><button id="closeBtn">✕</button></div>
      <a href="/" class="active" id="linkDash"><span class="icon">📈</span>Dashboard</a>
      <a href="/prochain" id="linkPro"><span class="icon">📊</span>Pro Option Chain</a>
      <a href="/indices" id="linkIndices"><span class="icon">📋</span>Indices</a>
      <a href="/stocks" id="linkStocks"><span class="icon">💹</span>Stocks</a>
      <a href="/adv-scan" id="linkAdvScan"><span class="icon">🔍</span>Adv Scan</a>
    </div>
  <div class="top-bar">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <span style="font-weight:700;color:#1e293b;font-size:13px">Dashboard</span>
    <span class="clock" id="clockDisplay"></span>
  </div>
  <div class="hero">
    <h1>Welcome to <span class="accent">NSE</span> Option Chain Analyzer</h1>
    <p>Real-time option chain analysis with technical indicators — VWAP, ADX, EMA Cross, and Supertrend on 3-minute timeframe.</p>
    <a href="/prochain" class="btn">Open Pro Option Chain</a>
  </div>
</div>
<script>
// ==================== SIDEBAR ====================
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const app = document.querySelector('.app');
const hamburger = document.getElementById('hamburgerBtn');
function isMobile() { return window.innerWidth <= 768; }
function toggleSidebar(open) {
  if (!isMobile()) return;
  sidebar.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
  hamburger.classList.toggle('show', !open);
}
hamburger.addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
function closeSidebar() { toggleSidebar(false); }
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);
['linkDash','linkPro','linkIndices','linkStocks','linkAdvScan'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (isMobile()) closeSidebar();
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    e.currentTarget.classList.add('active');
  });
});
if (isMobile()) hamburger.classList.add('show');
window.addEventListener('resize', () => {
  if (isMobile()) hamburger.classList.add('show');
  else { hamburger.classList.remove('show'); sidebar.classList.remove('open'); overlay.classList.remove('show'); }
});
// ==================== CLOCK ====================
function updateClock() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clockDisplay').textContent =
    `${pad(d.getDate())}-${months[d.getMonth()]}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
