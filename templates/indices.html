<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Indices - NSE Option Chain Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;font-size:13px;overflow:hidden;height:100vh}
.app{display:flex;flex-direction:column;height:100vh;padding:5px 6px;gap:4px;margin-left:200px}
@media(max-width:768px){.app{margin-left:0}}
.hamburger{background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;padding:2px 8px;border-radius:6px;transition:all .2s;display:none;align-items:center}
.hamburger:hover{background:#f1f5f9;color:#1e293b}
.hamburger.show{display:flex}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:99}
.overlay.show{display:block}
.sidebar{position:fixed;top:0;left:0;width:200px;height:100%;background:#fff;z-index:100;padding:0;display:flex;flex-direction:column;transition:left .25s ease;box-shadow:2px 0 15px rgba(0,0,0,0.1)}
@media(max-width:768px){.sidebar{left:-260px}.sidebar.open{left:0}}
.sidebar .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #e2e8f0}
.sidebar .head span{font-weight:700;font-size:14px;color:#1e293b}
.sidebar .head button{background:none;border:none;font-size:16px;color:#64748b;cursor:pointer;padding:2px 6px;border-radius:6px}
.sidebar .head button:hover{background:#f1f5f9}
.sidebar a{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#475569;text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.sidebar a:hover{background:#f8fafc;color:#6366f1;border-left-color:#6366f1}
.sidebar a.active{background:#eef2ff;color:#6366f1;border-left-color:#6366f1;font-weight:600}
.sidebar a .icon{font-size:16px;width:20px;text-align:center}
.top-bar{display:flex;align-items:center;gap:5px;background:#fff;padding:6px 12px;border-radius:10px;border:1px solid #e2e8f0;flex-wrap:wrap}
.top-bar .clock{margin-left:auto;font-size:13px;color:#94a3b8}
.search-bar{background:#f1f5f9;border:none;padding:5px 10px;border-radius:6px;font-size:12px;outline:none;width:200px;font-family:'Inter',sans-serif;color:#1e293b;transition:all .2s}
.search-bar:focus{background:#fff;box-shadow:0 0 0 2px rgba(99,102,241,0.15)}
.search-bar::placeholder{color:#94a3b8}
.count{color:#94a3b8;font-size:12px;margin-left:8px}
.scroll{flex:1;overflow:auto;padding:4px 0}
.scroll::-webkit-scrollbar{width:5px}
.scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px;padding:0 2px}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:10px 12px;display:flex;flex-direction:column;gap:4px;transition:all .15s;cursor:default}
.card:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(99,102,241,0.08)}
.card .name{font-size:12px;font-weight:600;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .row{display:flex;align-items:baseline;gap:8px}
.card .last{font-size:18px;font-weight:800;color:#1e293b;font-variant-numeric:tabular-nums}
.card .chg{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
.card .pct{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;font-variant-numeric:tabular-nums}
.card .pct.green{background:#dcfce7;color:#166534}
.card .pct.red{background:#fce4ec;color:#c62828}
@media(max-width:768px){
body{overflow:auto;height:auto}
.app{height:auto;padding:4px;gap:4px}
.search-bar{width:140px}
.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.card .last{font-size:16px}
}
@media(max-width:480px){
.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="head"><span>Navigation</span><button id="closeBtn">✕</button></div>
    <a href="/" id="linkDash"><span class="icon">📈</span>Dashboard</a>
    <a href="/prochain" id="linkPro"><span class="icon">📊</span>Pro Option Chain</a>
    <a href="/indices" class="active" id="linkIndices"><span class="icon">📋</span>Indices</a>
    <a href="/stocks" id="linkStocks"><span class="icon">💹</span>Stocks</a>
    <a href="/adv-scan" id="linkAdvScan"><span class="icon">🔍</span>Adv Scan</a>
  </div>
  <div class="top-bar">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <span style="font-weight:700;color:#1e293b;font-size:13px">All Indices</span>
    <input class="search-bar" id="searchInput" placeholder="Search indices..." autofocus>
    <span class="count" id="countDisplay"></span>
    <span class="clock" id="clockDisplay"></span>
  </div>
  <div class="scroll" id="scrollWrap">
    <div style="display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-weight:500;font-size:14px" id="loadingMsg">Loading indices...</div>
    <div class="grid" id="gridWrap"></div>
    <div id="stockView" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin:6px 2px 8px">
        <button onclick="hideStocks()" style="background:none;border:1px solid #e2e8f0;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:#475569;font-family:inherit">← Back to Indices</button>
        <span style="font-weight:700;font-size:14px;color:#1e293b" id="stockIndexName"></span>
        <span style="font-size:12px;color:#94a3b8" id="stockCount"></span>
        <input class="search-bar" id="stockSearch" placeholder="Search stocks..." style="margin-left:auto">
      </div>
      <div id="stockLoading" style="display:flex;align-items:center;justify-content:center;height:100px;color:#64748b;font-weight:500;font-size:14px">Loading stocks...</div>
      <div id="stockGrid" class="grid"></div>
    </div>
  </div>
</div>
<script>
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const app = document.querySelector('.app');
const hamburger = document.getElementById('hamburgerBtn');
function isMobile() { return window.innerWidth <= 768; }
function toggleSidebar(open) {
  if (!isMobile()) return;
  sidebar.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
  hamburger.classList.toggle('show', !open);
}
hamburger.addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
function closeSidebar() { toggleSidebar(false); }
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);
['linkDash','linkPro','linkIndices','linkStocks','linkAdvScan'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (isMobile()) closeSidebar();
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    e.currentTarget.classList.add('active');
  });
});
if (isMobile()) hamburger.classList.add('show');
window.addEventListener('resize', () => {
  if (isMobile()) hamburger.classList.add('show');
  else { hamburger.classList.remove('show'); sidebar.classList.remove('open'); overlay.classList.remove('show'); }
});

function updateClock() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clockDisplay').textContent =
    `${pad(d.getDate())}-${months[d.getMonth()]}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

let allData = [];
let filterText = '';

function fmt(v) { return (v || 0).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2}); }

async function fetchIndices() {
  try {
    const r = await fetch('/api/all-indices');
    if (!r.ok) return;
    const data = await r.json();
    if (!Array.isArray(data)) return;
    allData = data;
    document.getElementById('loadingMsg').style.display = 'none';
    render();
  } catch(e) {}
}

function render() {
  const q = filterText.toLowerCase();
  const filtered = q ? allData.filter(d => d.index.toLowerCase().includes(q)) : allData;
  document.getElementById('countDisplay').textContent = `${filtered.length} / ${allData.length}`;
  const g = document.getElementById('gridWrap');
  if (!filtered.length) {
    g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8;font-size:14px">No matching indices</div>';
    return;
  }
  g.innerHTML = filtered.map(d => {
    const chg = d.variation || 0;
    const pct = d.percentChange || 0;
    const cls = chg >= 0 ? 'green' : 'red';
    const sign = chg > 0 ? '+' : '';
    return `<div class="card" data-index="${d.index.replace(/"/g, '&quot;')}">
      <div class="name">${d.index}</div>
      <div class="row">
        <span class="last">${fmt(d.last)}</span>
        <span class="chg" style="color:${chg >= 0 ? '#166534' : '#c62828'}">${sign}${fmt(chg)}</span>
        <span class="pct ${cls}">${sign}${pct.toFixed(2)}%</span>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
  filterText = e.target.value;
  render();
});

let stockData = [];
let stockFilter = '';
let selectedIndex = '';

document.getElementById('gridWrap').addEventListener('click', e => {
  const card = e.target.closest('.card[data-index]');
  if (card) showStocks(card.dataset.index);
});

document.getElementById('stockSearch').addEventListener('input', e => {
  stockFilter = e.target.value;
  renderStocks();
});

async function showStocks(index) {
  selectedIndex = index;
  document.getElementById('gridWrap').style.display = 'none';
  document.getElementById('stockView').style.display = 'block';
  document.getElementById('stockIndexName').textContent = index;
  document.getElementById('stockLoading').style.display = 'flex';
  document.getElementById('stockGrid').innerHTML = '';
  document.getElementById('stockSearch').value = '';
  stockFilter = '';
  try {
    const r = await fetch('/api/index-constituents?index=' + encodeURIComponent(index));
    if (!r.ok) throw new Error('Failed');
    const data = await r.json();
    stockData = data.stocks || [];
    document.getElementById('stockCount').textContent = stockData.length + ' stocks';
    document.getElementById('stockLoading').style.display = 'none';
    renderStocks();
  } catch(e) {
    document.getElementById('stockLoading').innerHTML = 'Failed to load stocks';
  }
}

function hideStocks() {
  document.getElementById('stockView').style.display = 'none';
  document.getElementById('gridWrap').style.display = '';
  selectedIndex = '';
  stockData = [];
}

function fmtStock(v) {
  if (v == null || v === undefined || v === '-') return '-';
  return Number(v).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2});
}

function renderStocks() {
  const q = stockFilter.toLowerCase();
  const filtered = q ? stockData.filter(s => s.symbol.toLowerCase().includes(q)) : stockData;
  const g = document.getElementById('stockGrid');
  if (!filtered.length) {
    g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8;font-size:14px">No matching stocks</div>';
    return;
  }
  g.innerHTML = filtered.map(s => {
    const chg = s.netChange || 0;
    const pct = s.percentChange || 0;
    const cls = chg >= 0 ? 'green' : 'red';
    const sign = chg > 0 ? '+' : '';
    return `<div class="card">
      <div class="name">${s.symbol}</div>
      <div class="row">
        <span class="last">${fmtStock(s.lastPrice)}</span>
        <span class="chg" style="color:${chg >= 0 ? '#166534' : '#c62828'}">${sign}${fmtStock(chg)}</span>
        <span class="pct ${cls}">${sign}${pct.toFixed(2)}%</span>
      </div>
    </div>`;
  }).join('');
}

fetchIndices();
</script>
</body>
</html>
